<!DOCTYPE html>
<html>
    <HEAD>
        <meta charset="utf-8">
        <title>technlogy style</title>
        <body>
        <style>
            body{
                background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .wr apper{
                position: relative;
                width: 340px;
            }

            .tech box{
                background-image: url(aramesh.jpg);
                height: 220px;
                width: 100%;
                background-size: cover;
                background-position: center;
                border-radius: 15px;
                border: 2px solid rgba(255, 255, 255, 0.1);
                box-shadow: inset 2px 2px 6px rgba(255, 255, 255, 0.3),
               inset -2px -2px 6px rgba(0,0,0, 0.5)
               0 0 20px #00ffff,#0 0 40px #00ffff 
               backdrop-filter:blur(4px);
            }
            .reflection{
                height: 100px;
                margin-top: -6px;
                background-image: url(aramesh.jpg);
                background-size: cover;
                background-position: center;
                transform: scaleY(-1);
                border-radius: 0 0 15px 15px;
                opacity: 0.3;
                filter: blur(4px);
                mask-image: linear-gradient(to bottom,rgba(0,0,0,0.3),transparent);
            }
        </style>
       
    </HEAD>
    </body>
    <body>
      <div class="wr apper"></div>  
      <div class="tech box"></div>
      <div class="reflection"></div>
    </body>
</html>
